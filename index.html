<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウエスト 売上報告</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f7f6f2;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.15);
    --text:#1a1a18;--text-muted:#6b6b66;--text-hint:#9c9a92;
    --accent:#1a3a2a;--accent-light:#e8f0eb;--accent-mid:#2d6b47;
    --red:#c0392b;--red-light:#fdf0ee;--amber:#b8651a;--amber-light:#fef5e7;
    --blue:#1a4a7a;--blue-light:#eaf1fb;--purple:#4a1a7a;--purple-light:#f0eaf9;
    --font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;
    --radius:10px;--radius-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}
  .nav{background:var(--accent);padding:0 20px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:100;}
  .nav-brand{color:#fff;font-weight:700;font-size:15px;letter-spacing:.03em;margin-right:24px;flex-shrink:0;}
  .nav-tabs{display:flex;height:100%;}
  .nav-tab{color:rgba(255,255,255,0.6);padding:0 16px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:13px;height:100%;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
  .nav-tab.active{color:#fff;border-bottom-color:#6fcf97;}
  .nav-tab:hover:not(.active){color:rgba(255,255,255,0.85);}
  .nav-status{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:100px;flex-shrink:0;}
  .status-ok{background:rgba(111,207,151,0.2);color:#6fcf97;}
  .status-err{background:rgba(192,57,43,0.2);color:#ff7675;}
  .status-loading{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);}
  .page{display:none;padding:20px 16px;max-width:820px;margin:0 auto;}
  .page.active{display:block;}

  /* FORM */
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;}
  .form-section-title{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text-hint);text-transform:uppercase;margin-bottom:12px;}
  .form-row{display:grid;gap:10px;margin-bottom:10px;}
  .form-row.col2{grid-template-columns:1fr 1fr;}
  .form-row.col3{grid-template-columns:1fr 1fr 1fr;}
  .form-row.col4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  .form-label{font-size:11px;font-weight:500;color:var(--text-muted);}
  .form-label .req{color:var(--red);margin-left:2px;}
  input[type="text"],input[type="date"],input[type="number"],select{width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);-webkit-appearance:none;transition:border-color .15s,box-shadow .15s;}
  input[type="number"]{font-family:var(--mono);}
  input:focus,select:focus{outline:none;border-color:var(--accent-mid);box-shadow:0 0 0 3px rgba(45,107,71,0.12);background:#fff;}
  .pfx{position:relative;}
  .pfx-sym{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}
  .pfx input{padding-left:20px;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .sales-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .s-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;}
  .s-box-label{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:7px;}
  .s-row{display:flex;gap:6px;margin-bottom:5px;align-items:center;}
  .s-row:last-child{margin-bottom:0;}
  .s-sub{font-size:10px;color:var(--text-hint);min-width:28px;flex-shrink:0;}
  .btn-submit{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:8px;}
  .btn-submit:hover{background:var(--accent-mid);}
  .btn-submit:disabled{background:var(--text-hint);cursor:not-allowed;}
  .alert{display:none;border-radius:var(--radius);padding:12px 16px;font-size:14px;font-weight:500;text-align:center;margin-top:10px;}
  .alert-success{background:var(--accent-light);border:1px solid rgba(45,107,71,0.2);color:var(--accent-mid);}
  .alert-error{background:var(--red-light);border:1px solid rgba(192,57,43,0.2);color:var(--red);}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* DASHBOARD */
  .dash-header{margin-bottom:16px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .dash-title{font-size:18px;font-weight:700;}
  .dash-date{font-size:12px;color:var(--text-muted);}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .kpi-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:500;}
  .kpi-value{font-size:20px;font-weight:700;font-family:var(--mono);letter-spacing:-.02em;}
  .kpi-sub{font-size:11px;color:var(--text-hint);margin-top:2px;}
  .kpi-card.hi{background:var(--accent);border-color:var(--accent);}
  .kpi-card.hi .kpi-label{color:rgba(255,255,255,0.7);}
  .kpi-card.hi .kpi-value{color:#fff;}
  .kpi-card.hi .kpi-sub{color:rgba(255,255,255,0.55);}
  .section-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;}
  .grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-bottom:12px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
  .store-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px;}
  .store-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
  .store-table th{background:var(--bg);padding:8px 12px;text-align:right;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.04em;border-bottom:1px solid var(--border);}
  .store-table th:first-child,.store-table th:nth-child(2){text-align:left;}
  .store-table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);color:var(--text);}
  .store-table td:first-child,.store-table td:nth-child(2){text-align:left;}
  .store-table td:first-child{font-weight:500;font-size:11px;color:var(--text-muted);}
  .store-table tr:last-child td{border-bottom:none;}
  .store-table tr:hover td{background:var(--bg);}
  .mono{font-family:var(--mono);}
  .brand-pill{display:inline-block;font-size:9px;padding:1px 6px;border-radius:100px;font-weight:500;margin-left:4px;white-space:nowrap;}
  .type-pill{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;margin-left:3px;}
  .bar-cell{display:flex;align-items:center;gap:5px;justify-content:flex-end;}
  .bar-bg{width:50px;height:3px;background:var(--border);border-radius:2px;}
  .bar-fill{height:3px;border-radius:2px;background:var(--accent-mid);}
  .no-data{text-align:center;padding:28px;color:var(--text-hint);font-size:13px;}
  .filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .filter-btn{padding:5px 12px;border:1px solid var(--border-strong);border-radius:100px;background:var(--surface);font-family:var(--font);font-size:11px;cursor:pointer;color:var(--text-muted);transition:all .15s;white-space:nowrap;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  select.date-filter{padding:5px 10px;border:1px solid var(--border-strong);border-radius:100px;background:var(--surface);font-family:var(--font);font-size:11px;color:var(--text-muted);cursor:pointer;}
  .loading-overlay{text-align:center;padding:40px;color:var(--text-hint);font-size:13px;}

  /* ブランド色 */
  .b-yakiniku{background:#FEF0E6;color:#8B3A0F;}
  .b-azuma{background:#E6F0FE;color:#0F3A8B;}
  .b-udon{background:#E6FEF0;color:#0F6B3A;}
  .b-soba{background:#F9F0FE;color:#5C0F8B;}
  .b-chugoku{background:#FEF9E6;color:#8B6A0F;}
  .b-cafe{background:#FEE6F0;color:#8B0F4A;}
  .b-tobee{background:#E6FEFE;color:#0F6B6B;}
  .tp-24h{background:#FEE6E6;color:#8B0F0F;}
  .tp-vm{background:#E6E6FE;color:#0F0F8B;}
  .tp-vm24{background:#FEE6FE;color:#6B0F8B;}

  @media(max-width:600px){
    .kpi-grid{grid-template-columns:1fr 1fr;}
    .grid2{grid-template-columns:1fr;}
    .sales-grid{grid-template-columns:1fr 1fr;}
    .form-row.col3,.form-row.col4{grid-template-columns:1fr 1fr;}
    .page{padding:14px 12px;}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">WEST</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('form',this)">売上入力</button>
    <button class="nav-tab" onclick="showPage('dashboard',this)">ダッシュボード</button>
  </div>
  <div class="nav-status status-loading" id="nav-status">接続中...</div>
</nav>

<!-- ══ 入力フォーム ══ -->
<div class="page active" id="page-form">
  <div class="form-card">
    <div class="form-section-title">基本情報</div>
    <div class="form-row col3">
      <div class="form-group"><label class="form-label">日付 <span class="req">*</span></label><input type="date" id="f-date"></div>
      <div class="form-group"><label class="form-label">店舗番号</label><input type="text" id="f-storeno" placeholder="例：28"></div>
      <div class="form-group"><label class="form-label">報告者名 <span class="req">*</span></label><input type="text" id="f-reporter" placeholder="例：加戸 優"></div>
    </div>
    <div class="form-row col3">
      <div class="form-group"><label class="form-label">業態 <span class="req">*</span></label>
        <select id="f-brand" onchange="updateStoreType()">
          <option value="">選択してください</option>
          <option value="焼肉">焼肉</option>
          <option value="焼肉AZUMA">焼肉AZUMA</option>
          <option value="あずま">あずま（蕎麦）</option>
          <option value="うどん">うどん</option>
          <option value="生そば">生そば</option>
          <option value="中国/小明">中国/小明</option>
          <option value="カフェ">カフェ</option>
          <option value="東兵衛">東兵衛</option>
        </select>
      </div>
      <div class="form-group" id="store-type-wrap" style="display:none"><label class="form-label">区分</label>
        <select id="f-store-type">
          <option value="通常">通常</option>
          <option value="券売機">券売機</option>
          <option value="24H">24H</option>
          <option value="券売機24H">券売機24H</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">店舗名 <span class="req">*</span></label><input type="text" id="f-store" placeholder="例：麦野、新宮、平尾"></div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-section-title">売上実績</div>
    <div class="sales-grid">
      <div class="s-box"><div class="s-box-label">実績合計</div>
        <div class="s-row"><span class="s-sub">売上</span><div class="pfx" style="flex:1"><span class="pfx-sym">¥</span><input type="number" id="f-total" placeholder="0" min="0"></div></div>
        <div class="s-row"><span class="s-sub">客数</span><input type="number" id="f-total-guests" placeholder="0" min="0" style="flex:1"></div>
      </div>
      <div class="s-box"><div class="s-box-label">昼</div>
        <div class="s-row"><span class="s-sub">売上</span><div class="pfx" style="flex:1"><span class="pfx-sym">¥</span><input type="number" id="f-lunch" placeholder="0" min="0"></div></div>
        <div class="s-row"><span class="s-sub">客数</span><input type="number" id="f-lunch-guests" placeholder="0" min="0" style="flex:1"></div>
      </div>
      <div class="s-box"><div class="s-box-label">夜</div>
        <div class="s-row"><span class="s-sub">売上</span><div class="pfx" style="flex:1"><span class="pfx-sym">¥</span><input type="number" id="f-dinner" placeholder="0" min="0"></div></div>
        <div class="s-row"><span class="s-sub">客数</span><input type="number" id="f-dinner-guests" placeholder="0" min="0" style="flex:1"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="form-section-title">デリバリー・特別売上</div>
    <div class="form-row col4">
      <div class="s-box"><div class="s-box-label">TO</div>
        <div class="s-row"><span class="s-sub">売上</span><div class="pfx" style="flex:1"><span class="pfx-sym">¥</span><input type="number" id="f-to" placeholder="0" min="0"></div></div>
        <div class="s-row"><span class="s-sub">件数</span><input type="number" id="f-to-count" placeholder="0" min="0" style="flex:1"></div>
      </div>
      <div class="s-box"><div class="s-box-label">Uber Eats</div>
        <div class="s-row"><span class="s-sub">売上</span><div class="pfx" style="flex:1"><span class="pfx-sym">¥</span><input type="number" id="f-uber" placeholder="0" min="0"></div></div>
        <div class="s-row"><span class="s-sub">件数</span><input type="number" id="f-uber-count" placeholder="0" min="0" style="flex:1"></div>
      </div>
      <div class="s-box" style="grid-column:span 2"><div class="s-box-label">特別売上（任意）</div>
        <div class="s-row"><span class="s-sub">内容</span><input type="text" id="f-special-note" placeholder="ケータリング、宴会など" style="flex:1"></div>
        <div class="s-row"><span class="s-sub">金額</span><div class="pfx" style="flex:1"><span class="pfx-sym">¥</span><input type="number" id="f-special" placeholder="0" min="0"></div></div>
      </div>
    </div>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitForm()">報告を送信する</button>
  <div class="alert alert-success" id="alert-success">✓ 報告が送信されました。お疲れ様です！</div>
  <div class="alert alert-error" id="alert-error">送信に失敗しました。もう一度お試しください。</div>
</div>

<!-- ══ ダッシュボード ══ -->
<div class="page" id="page-dashboard">
  <div class="dash-header">
    <div><div class="dash-title">売上ダッシュボード</div><div class="dash-date" id="dash-date-label"></div></div>
    <select class="date-filter" id="date-filter" onchange="loadDashboard()"></select>
  </div>
  <div class="filter-row" id="brand-filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">全業態</button>
    <button class="filter-btn" onclick="setFilter('焼肉',this)">焼肉</button>
    <button class="filter-btn" onclick="setFilter('焼肉AZUMA',this)">焼肉AZUMA</button>
    <button class="filter-btn" onclick="setFilter('あずま',this)">あずま</button>
    <button class="filter-btn" onclick="setFilter('うどん',this)">うどん</button>
    <button class="filter-btn" onclick="setFilter('生そば',this)">生そば</button>
    <button class="filter-btn" onclick="setFilter('中国/小明',this)">中国/小明</button>
    <button class="filter-btn" onclick="setFilter('カフェ',this)">カフェ</button>
    <button class="filter-btn" onclick="setFilter('東兵衛',this)">東兵衛</button>
    <button class="filter-btn" onclick="loadDashboard()" style="margin-left:auto">↻ 更新</button>
  </div>
  <div id="dashboard-content"><div class="loading-overlay">データを読み込み中...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://zlzmchwghzejyacjwtyq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oPCMdP1RTlWzjBvDHIBZnw_1BSH_gdy';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allRecords = [];
let brandFilter = 'all';
let chartTime = null, chartBrand = null;

const BRAND_COLORS = {
  '焼肉':'b-yakiniku','焼肉AZUMA':'b-yakiniku','あずま':'b-azuma',
  'うどん':'b-udon','生そば':'b-soba','中国/小明':'b-chugoku',
  'カフェ':'b-cafe','東兵衛':'b-tobee'
};
const BRAND_CHART_COLORS = {
  '焼肉':'#D85A30','焼肉AZUMA':'#BA4010','あずま':'#378ADD',
  'うどん':'#1D9E75','生そば':'#7F77DD','中国/小明':'#BA7517',
  'カフェ':'#D4537E','東兵衛':'#0F8B8B'
};
const TYPE_CLASS = {'券売機':'tp-vm','24H':'tp-24h','券売機24H':'tp-vm24'};

async function checkConnection() {
  try {
    const {error} = await sb.from('sales_reports').select('id').limit(1);
    const el = document.getElementById('nav-status');
    if(error){el.textContent='接続エラー';el.className='nav-status status-err';}
    else{el.textContent='● 接続済み';el.className='nav-status status-ok';}
  } catch(e){
    const el=document.getElementById('nav-status');
    el.textContent='接続エラー';el.className='nav-status status-err';
  }
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='dashboard') loadDashboard();
}

function updateStoreType(){
  const brand = document.getElementById('f-brand').value;
  const wrap = document.getElementById('store-type-wrap');
  wrap.style.display = (brand==='うどん'||brand==='あずま') ? 'flex' : 'none';
}

function setFilter(brand,btn){
  brandFilter=brand;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    if(!b.getAttribute('onclick').includes('loadDashboard')) b.classList.remove('active');
  });
  btn.classList.add('active');
  renderDashboard();
}

async function submitForm(){
  const date=document.getElementById('f-date').value;
  const reporter=document.getElementById('f-reporter').value.trim();
  const brand=document.getElementById('f-brand').value;
  const store=document.getElementById('f-store').value.trim();
  const total=parseInt(document.getElementById('f-total').value)||0;
  if(!date||!reporter||!brand||!store||!total){alert('日付・報告者・業態・店舗名・実績売上は必須です');return;}

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>送信中...';

  const lunchV=parseInt(document.getElementById('f-lunch').value)||0;
  const lunchG=parseInt(document.getElementById('f-lunch-guests').value)||0;
  const dinnerV=parseInt(document.getElementById('f-dinner').value)||0;
  const dinnerG=parseInt(document.getElementById('f-dinner-guests').value)||0;
  const storeTypeWrap=document.getElementById('store-type-wrap');
  const storeType=storeTypeWrap.style.display!=='none'?document.getElementById('f-store-type').value:'通常';

  const {error}=await sb.from('sales_reports').insert({
    report_date:date, reporter, brand,
    store_no:document.getElementById('f-storeno').value.trim(),
    store_type:storeType, store,
    total_sales:total,
    total_guests:parseInt(document.getElementById('f-total-guests').value)||0,
    lunch_sales:lunchV, lunch_guests:lunchG,
    dinner_sales:dinnerV, dinner_guests:dinnerG,
    lunch_unit:parseInt(document.getElementById('f-lunch-unit')||0)||(lunchG?Math.round(lunchV/lunchG):0),
    dinner_unit:parseInt(document.getElementById('f-dinner-unit')||0)||(dinnerG?Math.round(dinnerV/dinnerG):0),
    to_sales:parseInt(document.getElementById('f-to').value)||0,
    to_count:parseInt(document.getElementById('f-to-count').value)||0,
    uber_sales:parseInt(document.getElementById('f-uber').value)||0,
    uber_count:parseInt(document.getElementById('f-uber-count').value)||0,
    special_sales:parseInt(document.getElementById('f-special').value)||0,
    special_note:document.getElementById('f-special-note').value.trim(),
  });

  btn.disabled=false;
  btn.textContent='報告を送信する';

  if(error){showAlert('alert-error');console.error(error);}
  else{
    showAlert('alert-success');
    ['f-storeno','f-reporter','f-store','f-total','f-total-guests','f-lunch','f-lunch-guests',
     'f-dinner','f-dinner-guests','f-to','f-to-count','f-uber','f-uber-count','f-special','f-special-note']
      .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('f-brand').value='';
    document.getElementById('store-type-wrap').style.display='none';
  }
}

function showAlert(id){
  ['alert-success','alert-error'].forEach(i=>document.getElementById(i).style.display='none');
  const el=document.getElementById(id);
  el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

async function loadDashboard(){
  document.getElementById('dashboard-content').innerHTML='<div class="loading-overlay">データを読み込み中...</div>';
  const sel=document.getElementById('date-filter');
  const dateVal=sel.value;

  let query=sb.from('sales_reports').select('*').order('report_date',{ascending:false});
  if(dateVal&&dateVal!=='all') query=query.eq('report_date',dateVal);

  const {data,error}=await query;
  if(error){document.getElementById('dashboard-content').innerHTML='<div class="no-data">データの読み込みに失敗しました</div>';return;}
  allRecords=data||[];

  const dates=[...new Set(allRecords.map(r=>r.report_date))].sort().reverse();
  const today=new Date().toISOString().split('T')[0];
  const current=sel.value||today;
  sel.innerHTML='<option value="all">全期間</option>';
  dates.forEach(d=>{
    const [y,m,dy]=d.split('-');
    const opt=document.createElement('option');
    opt.value=d;
    opt.textContent=`${y}年${parseInt(m)}月${parseInt(dy)}日${d===today?' (今日)':''}`;
    sel.appendChild(opt);
  });
  if([...sel.options].find(o=>o.value===current)) sel.value=current;

  renderDashboard();
}

function renderDashboard(){
  const dateVal=document.getElementById('date-filter').value;
  let data=allRecords;
  if(dateVal&&dateVal!=='all') data=data.filter(r=>r.report_date===dateVal);
  if(brandFilter!=='all') data=data.filter(r=>r.brand===brandFilter);

  const today=new Date().toISOString().split('T')[0];
  const label=dateVal==='all'?`全期間（${[...new Set(allRecords.map(r=>r.report_date))].length}日分）`:
    (()=>{const[y,m,d]=dateVal.split('-');return `${y}年${parseInt(m)}月${parseInt(d)}日`;})();
  document.getElementById('dash-date-label').textContent=label;

  const grandTotal=data.reduce((s,r)=>s+r.total_sales,0);
  const grandGuests=data.reduce((s,r)=>s+r.total_guests,0);
  const grandDelivery=data.reduce((s,r)=>s+r.to_sales+r.uber_sales,0);
  const storeCount=[...new Set(data.map(r=>r.store))].length;

  document.getElementById('dashboard-content').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card hi"><div class="kpi-label">全店合計売上</div><div class="kpi-value">${grandTotal?'¥'+grandTotal.toLocaleString():'—'}</div><div class="kpi-sub">${storeCount}店舗分</div></div>
      <div class="kpi-card"><div class="kpi-label">総客数</div><div class="kpi-value">${grandGuests?grandGuests.toLocaleString()+'名':'—'}</div><div class="kpi-sub">全店合計</div></div>
      <div class="kpi-card"><div class="kpi-label">平均客単価</div><div class="kpi-value">${grandGuests?'¥'+Math.round(grandTotal/grandGuests).toLocaleString():'—'}</div><div class="kpi-sub">全店平均</div></div>
      <div class="kpi-card"><div class="kpi-label">TO + Uber</div><div class="kpi-value">${grandDelivery?'¥'+grandDelivery.toLocaleString():'—'}</div><div class="kpi-sub">デリバリー合計</div></div>
    </div>
    <div class="grid2">
      <div class="chart-card"><div class="section-title">業態別売上</div><div style="position:relative;height:190px"><canvas id="chart-brand"></canvas></div></div>
      <div class="chart-card"><div class="section-title">昼・夜 売上内訳</div><div style="position:relative;height:190px"><canvas id="chart-time"></canvas></div></div>
    </div>
    <div class="store-table-wrap">
      <div class="section-title" style="padding:12px 14px 0">店舗別売上一覧</div>
      <table class="store-table">
        <thead><tr>
          <th style="width:6%">No.</th>
          <th style="width:24%">店舗</th>
          <th style="width:16%">売上</th>
          <th style="width:10%">客数</th>
          <th style="width:10%">単価</th>
          <th style="width:10%">TO</th>
          <th style="width:10%">Uber</th>
          <th style="width:14%">割合</th>
        </tr></thead>
        <tbody id="store-tbody"></tbody>
      </table>
    </div>`;

  // 店舗テーブル
  const storeMap={};
  data.forEach(r=>{
    const key=r.store;
    if(!storeMap[key]) storeMap[key]={no:r.store_no,brand:r.brand,type:r.store_type,total:0,guests:0,to:0,uber:0,lunch:0,dinner:0};
    const s=storeMap[key];
    s.total+=r.total_sales;s.guests+=r.total_guests;s.to+=r.to_sales;s.uber+=r.uber_sales;s.lunch+=r.lunch_sales;s.dinner+=r.dinner_sales;
  });
  const sorted=Object.entries(storeMap).sort((a,b)=>b[1].total-a[1].total);
  const maxT=sorted.length?sorted[0][1].total:1;
  const tbody=document.getElementById('store-tbody');
  tbody.innerHTML=sorted.length===0?'<tr><td colspan="8" class="no-data">データがありません</td></tr>':
    sorted.map(([name,s])=>{
      const pct=grandTotal?Math.round(s.total/grandTotal*100):0;
      const unit=s.guests?Math.round(s.total/s.guests):0;
      const barW=Math.round(s.total/maxT*100);
      const bc=BRAND_COLORS[s.brand]||'b-udon';
      const tc=s.type&&s.type!=='通常'?`<span class="type-pill ${TYPE_CLASS[s.type]||''}">${s.type}</span>`:'';
      return `<tr>
        <td>${s.no||'—'}</td>
        <td>${name}<span class="brand-pill ${bc}">${s.brand}</span>${tc}</td>
        <td class="mono">¥${s.total.toLocaleString()}</td>
        <td class="mono">${s.guests.toLocaleString()}</td>
        <td class="mono">${unit?'¥'+unit.toLocaleString():'—'}</td>
        <td class="mono">${s.to?'¥'+s.to.toLocaleString():'—'}</td>
        <td class="mono">${s.uber?'¥'+s.uber.toLocaleString():'—'}</td>
        <td><div class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div><span style="font-size:10px;color:var(--text-hint);min-width:24px">${pct}%</span></div></td>
      </tr>`;
    }).join('');

  // グラフ
  if(chartTime) chartTime.destroy();
  if(chartBrand) chartBrand.destroy();

  // 業態別ドーナツ
  const brandTotals={};
  data.forEach(r=>{brandTotals[r.brand]=(brandTotals[r.brand]||0)+r.total_sales;});
  const bLabels=Object.keys(brandTotals).filter(k=>brandTotals[k]>0);
  if(bLabels.length>0){
    chartBrand=new Chart(document.getElementById('chart-brand'),{
      type:'doughnut',
      data:{labels:bLabels,datasets:[{data:bLabels.map(k=>brandTotals[k]),backgroundColor:bLabels.map(k=>BRAND_CHART_COLORS[k]||'#888'),borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,boxHeight:10,padding:6}},
        tooltip:{callbacks:{label:ctx=>' ¥'+ctx.parsed.toLocaleString()}}}}
    });
  }

  // 昼夜棒グラフ（上位8店舗）
  const top8=sorted.slice(0,8);
  if(top8.length>0){
    chartTime=new Chart(document.getElementById('chart-time'),{
      type:'bar',
      data:{labels:top8.map(([n])=>n),datasets:[
        {label:'昼',data:top8.map(([,s])=>s.lunch),backgroundColor:'#9FE1CB',borderWidth:0},
        {label:'夜',data:top8.map(([,s])=>s.dinner),backgroundColor:'#1D9E75',borderWidth:0},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},boxWidth:10,boxHeight:10,padding:6}}},
        scales:{
          x:{stacked:true,ticks:{font:{size:9},color:'#9c9a92',maxRotation:35}},
          y:{stacked:true,ticks:{callback:v=>'¥'+(v/10000).toFixed(0)+'万',font:{size:9},color:'#9c9a92'},grid:{color:'rgba(0,0,0,0.04)'}}
        }
      }
    });
  }
}

document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
checkConnection();
</script>
